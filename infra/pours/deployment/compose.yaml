name: agentscope-sidekick
networks:
  agentscope-sidekick-network:
    name: agentscope-sidekick-network
services:
  agentscope-api:
    build:
      context: ../../..
      dockerfile: apps/api/Dockerfile
    container_name: agentscope-sidekick-api
    depends_on:
      ingester:
        condition: service_healthy
    environment:
      AGENTSCOPE_ENV: foundry-demo
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4318
    networks:
    - agentscope-sidekick-network
    ports:
    - 8088:8088
    restart: unless-stopped
  agentscope-demo-agent:
    build:
      context: ../../..
      dockerfile: apps/api/Dockerfile
    command:
    - python
    - -m
    - apps.agent.demo_agent
    container_name: agentscope-sidekick-demo-agent
    depends_on:
      ingester:
        condition: service_healthy
    environment:
      AGENTSCOPE_ENV: foundry-demo
      OTEL_EXPORTER_OTLP_ENDPOINT: http://ingester:4318
    networks:
    - agentscope-sidekick-network
    profiles:
    - demo-once
  agentscope-sidekick-mcp:
    container_name: agentscope-sidekick-mcp
    environment:
    - MCP_SERVER_PORT=8000
    - SIGNOZ_URL=http://agentscope-sidekick-signoz-0:8080
    - TRANSPORT_MODE=http
    - SIGNOZ_API_KEY=${SIGNOZ_API_KEY}
    image: signoz/signoz-mcp-server:latest
    networks:
    - agentscope-sidekick-network
    ports:
    - 8000:8000
    restart: unless-stopped
  agentscope-sidekick-metastore-postgres-0:
    container_name: agentscope-sidekick-metastore-postgres-0
    environment:
    - POSTGRES_DB=signoz
    - POSTGRES_PASSWORD=signoz
    - POSTGRES_USER=signoz
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -U signoz -d signoz
      timeout: 10s
    image: postgres:16
    networks:
    - agentscope-sidekick-network
    restart: unless-stopped
    volumes:
    - agentscope-sidekick-metastore-postgres-0-data:/var/lib/postgresql/data
  agentscope-sidekick-signoz-0:
    container_name: agentscope-sidekick-signoz-0
    environment:
    - SIGNOZ_SQLSTORE_POSTGRES_DSN=postgres://signoz:signoz@agentscope-sidekick-metastore-postgres-0:5432/signoz?sslmode=disable
    - SIGNOZ_SQLSTORE_PROVIDER=postgres
    - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://agentscope-sidekick-telemetrystore-clickhouse-0-0:9000
    - SIGNOZ_TELEMETRYSTORE_PROVIDER=clickhouse
    - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_TOKENIZER_JWT_SECRET}
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8080/api/v1/health
      timeout: 10s
    image: signoz/signoz:latest
    networks:
    - agentscope-sidekick-network
    ports:
    - 8080:8080
    restart: unless-stopped
  agentscope-sidekick-telemetrykeeper-clickhousekeeper-0:
    container_name: agentscope-sidekick-telemetrykeeper-clickhousekeeper-0
    entrypoint:
    - /usr/bin/clickhouse-keeper
    - --config-file=/etc/clickhouse-keeper/keeper.yaml
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD
      - clickhouse-keeper-client
      - -h
      - localhost
      - -p
      - "9181"
      - -q
      - ls
      timeout: 10s
    image: clickhouse/clickhouse-keeper:25.12.5
    networks:
    - agentscope-sidekick-network
    restart: unless-stopped
    volumes:
    - agentscope-sidekick-telemetrykeeper-0-data:/var/lib/clickhouse-keeper
    - ./telemetrykeeper/clickhousekeeper/keeper-0.yaml:/etc/clickhouse-keeper/keeper.yaml:ro
  agentscope-sidekick-telemetrystore-clickhouse-0-0:
    container_name: agentscope-sidekick-telemetrystore-clickhouse-0-0
    depends_on:
      agentscope-sidekick-telemetrykeeper-clickhousekeeper-0:
        condition: service_healthy
      agentscope-sidekick-telemetrystore-clickhouse-user-scripts:
        condition: service_completed_successfully
    environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1
    - CLICKHOUSE_CONFIG=/etc/clickhouse-server/config-0-0.yaml
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://localhost:8123/ping
      timeout: 10s
    image: clickhouse/clickhouse-server:25.12.5
    networks:
    - agentscope-sidekick-network
    restart: unless-stopped
    volumes:
    - agentscope-sidekick-telemetrystore-0-0-data:/var/lib/clickhouse
    - agentscope-sidekick-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts:ro
    - ./telemetrystore/clickhouse/config-0-0.yaml:/etc/clickhouse-server/config-0-0.yaml:ro
    - ./telemetrystore/clickhouse/functions.yaml:/etc/clickhouse-server/functions.yaml:ro
  agentscope-sidekick-telemetrystore-clickhouse-user-scripts:
    command:
    - bash
    - -c
    - |-
      version="v0.0.1"
      node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
      node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
      echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
      cd /tmp
      wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
      tar -xvzf histogram-quantile.tar.gz
      mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    container_name: agentscope-sidekick-telemetrystore-clickhouse-user-scripts
    image: clickhouse/clickhouse-server:25.12.5
    networks:
    - agentscope-sidekick-network
    restart: on-failure
    volumes:
    - agentscope-sidekick-telemetrystore-user-scripts:/var/lib/clickhouse/user_scripts
  agentscope-sidekick-telemetrystore-migrator:
    command:
    - -c
    - |
      /signoz-otel-collector migrate ready &&
      /signoz-otel-collector migrate bootstrap &&
      /signoz-otel-collector migrate sync up &&
      /signoz-otel-collector migrate async up
    container_name: agentscope-sidekick-telemetrystore-migrator
    entrypoint:
    - /bin/sh
    environment:
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://agentscope-sidekick-telemetrystore-clickhouse-0-0:9000
    - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    image: signoz/signoz-otel-collector:latest
    networks:
    - agentscope-sidekick-network
    restart: on-failure
  agentscope-web:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    container_name: agentscope-sidekick-web
    depends_on:
      agentscope-api:
        condition: service_started
    networks:
    - agentscope-sidekick-network
    ports:
    - 5173:5173
    restart: unless-stopped
  ingester:
    command:
    - -c
    - |
      /signoz-otel-collector migrate sync check &&
      /signoz-otel-collector --config=/etc/otel-collector-config.yaml
    entrypoint:
    - /bin/sh
    environment:
    - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://agentscope-sidekick-telemetrystore-clickhouse-0-0:9000
    - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    healthcheck:
      interval: 5s
      retries: 24
      start_period: 30s
      test:
      - CMD-SHELL
      - bash -c 'echo > /dev/tcp/127.0.0.1/4318'
      timeout: 3s
    image: signoz/signoz-otel-collector:latest
    networks:
      agentscope-sidekick-network:
        aliases:
        - agentscope-sidekick-ingester
    ports:
    - 4317:4317
    - 4318:4318
    restart: unless-stopped
    volumes:
    - ./ingester/ingester.yaml:/etc/otel-collector-config.yaml:ro
    - ./ingester/opamp.yaml:/etc/opamp-config.yaml:ro
volumes:
  agentscope-sidekick-metastore-postgres-0-data:
    name: agentscope-sidekick-metastore-postgres-0-data
  agentscope-sidekick-telemetrykeeper-0-data:
    name: agentscope-sidekick-telemetrykeeper-0-data
  agentscope-sidekick-telemetrystore-0-0-data:
    name: agentscope-sidekick-telemetrystore-0-0-data
  agentscope-sidekick-telemetrystore-user-scripts:
    name: agentscope-sidekick-telemetrystore-user-scripts
