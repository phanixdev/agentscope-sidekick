name: Track 1 verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: track-1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, and validate evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install frontend dependencies
        run: npm ci
      - name: Build product and run Track 1 tests
        run: npm run check
      - name: Confirm production bundle
        run: test -f dist/index.html